<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>planetDefs Editor [WIP]</title>
    <link rel="icon" type="image/x-icon" href="..\icon.png">
    <link rel="stylesheet" href="styles.css">
</head>
    <body>
        <div class="BuilderWindow">    
            <div style="padding-top: 0.4cm;padding-bottom: 0.4cm;">
                <div style="display: inline;">
                    <span id="tipButton" class="tipButton"></span><span style="user-select: none;">Tip: </span>
                </div>
                <div id="tip" style="display: inline;user-select: none"></div>
            </div>
            <div class="TreeViewPanel">
                <div class="TreeView">
                    <ul id="galaxyTreeView"></ul>
                </div>
            </div>
            <div class="SidePanel">
                <div class="GalaxyView">
                    <canvas id="galaxyCanvas" class="GalaxyCanvas">

                    </canvas>
                </div>
                <div class="InputPanel">
                    <div>
                        <div class="Description">
                            This is where the description of the selected property and an input field is given
                        </div>
                    </div>
                    <div class="Input">
                        <input class="TextBox" placeholder="Placeholder :v">
                    </div>
                </div>
            </div>
        </div>
    </body>
    <body class="contextMenu">
        <!--Context menu-->
    </body>
</html>
<script src="scripts.js"></script>
